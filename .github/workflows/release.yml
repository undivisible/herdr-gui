name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/crepuscularity
          path: crepuscularity
          token: ${{ secrets.CREPUSCULARITY_TOKEN || secrets.GITHUB_TOKEN }}
      - run: mv crepuscularity ../crepuscularity
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          mkdir -p dist
          tar -czf dist/herdr-gui-macos-aarch64.tar.gz -C target/release herdr-gui
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/herdr-gui-macos-aarch64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
