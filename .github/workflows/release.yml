name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: mkdir -p dist && cp target/release/herdr-gui dist/herdr-gui
      - uses: actions/upload-artifact@v4
        with:
          name: herdr-gui-macos
          path: dist/herdr-gui
